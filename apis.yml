description: >-
  The US Citizenship and Immigration Services (USCIS) is a government agency responsible
  for overseeing lawful immigration to the United States. Its primary function is
  to process and adjudicate applications for various immigration benefits, such as
  green cards, work permits, and naturalization. USCIS also conducts background checks,
  interviews applicants, and makes decisions on eligibility for immigration status.
