aid: us-citizenship-and-immigration-services
name: US Citizenship and Immigration Services
description: The US Citizenship and Immigration Services (USCIS) is a government agency responsible for overseeing lawful
  immigration to the United States. Its primary function is to process and adjudicate applications for various immigration
  benefits, such as green cards, work permits, and naturalization. USCIS provides a public developer portal (developer.uscis.gov)
  with APIs for case status lookup and FOIA request submission. The Torch API Program enables qualified software developers
  to integrate USCIS services into immigration case management applications, providing OAuth 2.0 secured access to case status
  information and Freedom of Information Act (FOIA) request capabilities.
