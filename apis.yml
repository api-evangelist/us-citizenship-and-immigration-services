- aid: us-citizenship-and-immigration-services:uscis-foia-request-and-status-api
  name: USCIS FOIA Request and Status API
  description: The USCIS FOIA Request and Status API enables consumers to submit Freedom of Information Act (FOIA) or Privacy
    Act (PA) requests for Alien File records and check the status of submitted requests using the Request Number returned
    upon creation. Authentication uses OAuth 2.0 client credentials. Version 1.2.0 is the current production version.
  humanURL: https://developer.uscis.gov/api/foia-request-and-status
