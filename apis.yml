apis:
- aid: us-citizenship-and-immigration-services:uscis-case-status-api
  name: USCIS Case Status API
  description: 'The USCIS Case Status API provides case status information to USCIS customers and their representatives who
    require regular access to case status information. It accepts a 13-character USCIS receipt number and returns the current
    case status, form type, submission date, and historical status timeline in English and Spanish. Authentication uses OAuth
    2.0 client credentials flow. Rate limits: 5 transactions per second, 1,000 daily requests.'
  humanURL: https://developer.uscis.gov/api/case-status
  baseURL: https://api-int.uscis.gov/case-status
