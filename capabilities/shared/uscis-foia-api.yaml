naftiko: "1.0.0-alpha1"

info:
  label: USCIS FOIA Request and Status API
  description: >-
    USCIS FOIA Request and Status API enabling submission of Freedom of
    Information Act and Privacy Act requests for Alien File records and
    status tracking of submitted requests.
  tags:
    - Federal Government
    - Immigration
    - FOIA
    - Privacy Act
    - Alien File
    - USCIS
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      USCIS_CLIENT_ID: USCIS_CLIENT_ID
      USCIS_CLIENT_SECRET: USCIS_CLIENT_SECRET

capability:
  consumes:
    - type: http
      namespace: uscis-foia
      baseUri: https://api-int.uscis.gov/foia
      description: USCIS FOIA request submission and status tracking API
      authentication:
        type: bearer
        token: "{{USCIS_ACCESS_TOKEN}}"
      resources:
        - name: foia-requests
          path: /requests
          description: FOIA and Privacy Act request management
          operations:
            - name: submit-foia-request
              method: POST
              description: Submit a new FOIA or Privacy Act request for Alien File records
              inputParameters:
                - name: requestType
                  in: body
                  type: string
                  required: true
                  description: Request type (FOIA or PrivacyAct)
                - name: subjectFirstName
                  in: body
                  type: string
                  required: true
                  description: First name of the subject
                - name: subjectLastName
                  in: body
                  type: string
                  required: true
                  description: Last name of the subject
                - name: subjectDateOfBirth
                  in: body
                  type: string
                  required: false
                  description: Date of birth of the subject
                - name: subjectAlienNumber
                  in: body
                  type: string
                  required: false
                  description: USCIS A-Number if known
                - name: requesterName
                  in: body
                  type: string
                  required: true
                  description: Name of the requester
                - name: requesterEmail
                  in: body
                  type: string
                  required: true
                  description: Email for response delivery
                - name: requesterType
                  in: body
                  type: string
                  required: true
                  description: Relationship to subject (self, attorney, etc.)
                - name: descriptionOfRecords
                  in: body
                  type: string
                  required: true
                  description: Description of records requested
                - name: deliveryMethod
                  in: body
                  type: string
                  required: false
                  description: Delivery method (email, usps, portal)
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-foia-request-status
              method: GET
              description: Check status of a submitted FOIA request by request number
              inputParameters:
                - name: requestNumber
                  in: path
                  type: string
                  required: true
                  description: FOIA request number returned upon submission
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8102
      namespace: uscis-foia-rest
      resources:
        - path: /v1/foia-requests
          name: foia-requests
          description: Submit FOIA requests
          operations:
            - method: POST
              name: submit-foia-request
              description: Submit a new FOIA or Privacy Act request
              call: "uscis-foia.submit-foia-request"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/foia-requests/{requestNumber}
          name: foia-request-status
          description: Get FOIA request status
          operations:
            - method: GET
              name: get-foia-request-status
              description: Check FOIA request status
              call: "uscis-foia.get-foia-request-status"
              with:
                requestNumber: "rest.requestNumber"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9102
      namespace: uscis-foia-mcp
      transport: http
      tools:
        - name: submit-foia-request
          description: Submit a new FOIA or Privacy Act request for USCIS Alien File records
          hints:
            readOnly: false
            openWorld: false
          call: "uscis-foia.submit-foia-request"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-foia-request-status
          description: Check the status of a submitted USCIS FOIA request
          hints:
            readOnly: true
            openWorld: false
          call: "uscis-foia.get-foia-request-status"
          with:
            requestNumber: "tools.requestNumber"
          outputParameters:
            - type: object
              mapping: "$."
