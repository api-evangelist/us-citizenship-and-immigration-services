naftiko: 1.0.0-alpha2
info:
  label: USCIS Case Status API — Case Status
  description: 'USCIS Case Status API — Case Status. 1 operations. Lead operation: Get Case Status By Receipt Number. Self-contained
    Naftiko capability covering one Us Citizenship And Immigration Services business surface.'
  tags:
  - Us Citizenship And Immigration Services
  - Case Status
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    US_CITIZENSHIP_AND_IMMIGRATION_SERVICES_API_KEY: US_CITIZENSHIP_AND_IMMIGRATION_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: uscis-case-status-case-status
    baseUri: https://api-int.uscis.gov/case-status
    description: USCIS Case Status API — Case Status business capability. Self-contained, no shared references.
    resources:
    - name: receiptNumber
      path: /{receiptNumber}
      operations:
      - name: getcasestatus
        method: GET
        description: Get Case Status By Receipt Number
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: receiptNumber
          in: path
          type: string
          description: 'The 13-character USCIS receipt number. Format: 3-letter prefix (EAC=Vermont Service Center, LIN=Nebraska
            Service Center, SRC=Texas Service Center) followed by 1'
          required: true
    authentication:
      type: bearer
      token: '{{env.US_CITIZENSHIP_AND_IMMIGRATION_SERVICES_API_KEY}}'
  exposes:
  - type: rest
    namespace: uscis-case-status-case-status-rest
    port: 8080
    description: REST adapter for USCIS Case Status API — Case Status. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/{receiptnumber}
      name: receiptnumber
      description: REST surface for receiptNumber.
      operations:
      - method: GET
        name: getcasestatus
        description: Get Case Status By Receipt Number
        call: uscis-case-status-case-status.getcasestatus
        with:
          receiptNumber: rest.receiptNumber
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: uscis-case-status-case-status-mcp
    port: 9090
    transport: http
    description: MCP adapter for USCIS Case Status API — Case Status. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: get-case-status-receipt-number
      description: Get Case Status By Receipt Number
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: uscis-case-status-case-status.getcasestatus
      with:
        receiptNumber: tools.receiptNumber
      outputParameters:
      - type: object
        mapping: $.
