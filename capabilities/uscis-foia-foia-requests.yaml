naftiko: 1.0.0-alpha2
info:
  label: USCIS FOIA Request and Status API — FOIA Requests
  description: 'USCIS FOIA Request and Status API — FOIA Requests. 2 operations. Lead operation: Submit FOIA or Privacy Act
    Request. Self-contained Naftiko capability covering one Us Citizenship And Immigration Services business surface.'
  tags:
  - Us Citizenship And Immigration Services
  - FOIA Requests
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    US_CITIZENSHIP_AND_IMMIGRATION_SERVICES_API_KEY: US_CITIZENSHIP_AND_IMMIGRATION_SERVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: uscis-foia-foia-requests
    baseUri: https://api-int.uscis.gov/foia
    description: USCIS FOIA Request and Status API — FOIA Requests business capability. Self-contained, no shared references.
    resources:
    - name: requests
      path: /requests
      operations:
      - name: submitfoiarequest
        method: POST
        description: Submit FOIA or Privacy Act Request
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: requests-requestNumber
      path: /requests/{requestNumber}
      operations:
      - name: getfoiarequeststatus
        method: GET
        description: Get FOIA Request Status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: requestNumber
          in: path
          type: string
          description: 'The FOIA request number returned when the request was submitted. Format: USCIS-YYYY-NNNNNN'
          required: true
    authentication:
      type: bearer
      token: '{{env.US_CITIZENSHIP_AND_IMMIGRATION_SERVICES_API_KEY}}'
  exposes:
  - type: rest
    namespace: uscis-foia-foia-requests-rest
    port: 8080
    description: REST adapter for USCIS FOIA Request and Status API — FOIA Requests. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/requests
      name: requests
      description: REST surface for requests.
      operations:
      - method: POST
        name: submitfoiarequest
        description: Submit FOIA or Privacy Act Request
        call: uscis-foia-foia-requests.submitfoiarequest
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/requests/{requestnumber}
      name: requests-requestnumber
      description: REST surface for requests-requestNumber.
      operations:
      - method: GET
        name: getfoiarequeststatus
        description: Get FOIA Request Status
        call: uscis-foia-foia-requests.getfoiarequeststatus
        with:
          requestNumber: rest.requestNumber
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: uscis-foia-foia-requests-mcp
    port: 9090
    transport: http
    description: MCP adapter for USCIS FOIA Request and Status API — FOIA Requests. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: submit-foia-privacy-act-request
      description: Submit FOIA or Privacy Act Request
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: uscis-foia-foia-requests.submitfoiarequest
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-foia-request-status
      description: Get FOIA Request Status
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: uscis-foia-foia-requests.getfoiarequeststatus
      with:
        requestNumber: tools.requestNumber
      outputParameters:
      - type: object
        mapping: $.
